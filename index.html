
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEDESIHOMES - Student Housing Worldwide</title>
    <meta name="description" content="Find your perfect student home anywhere in the world. Quality accommodations in India, US, UK, Australia and beyond." />
    <meta name="author" content="WEDESIHOMES" />

    <meta property="og:title" content="WEDESIHOMES - Student Housing Worldwide" />
    <meta property="og:description" content="Find your perfect student home anywhere in the world. Quality accommodations in India, US, UK, Australia and beyond." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.wedesihomes.com" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WEDESIHOMES - Student Housing Worldwide" />
    <meta name="twitter:description" content="Find your perfect student home anywhere in the world." />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        width: 100%;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
        width: 100%;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #7CB518 0%, #001F54 100%);
        color: white;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 1rem;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .hidden {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div class="loading-screen" id="loading-screen">
      <div class="loading-spinner"></div>
      <div>
        <h1>WEDESIHOMES</h1>
        <p>Loading your perfect student home...</p>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Simple loading screen removal
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
          }
        }, 1000);
      });
      
      // Fallback timeout
      setTimeout(function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
        }
      }, 5000);
    </script>
  </body>
</html>
