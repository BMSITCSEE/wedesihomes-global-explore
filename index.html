
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEDESIHOMES - Student Housing Worldwide</title>
    <meta name="description" content="Find your perfect student home anywhere in the world. Quality accommodations in India, US, UK, Australia and beyond." />
    <meta name="author" content="WEDESIHOMES" />

    <meta property="og:title" content="WEDESIHOMES - Student Housing Worldwide" />
    <meta property="og:description" content="Find your perfect student home anywhere in the world. Quality accommodations in India, US, UK, Australia and beyond." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.wedesihomes.com" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WEDESIHOMES - Student Housing Worldwide" />
    <meta name="twitter:description" content="Find your perfect student home anywhere in the world." />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <style>
      /* Critical loading styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        width: 100%;
      }
      
      #root {
        min-height: 100vh;
        width: 100%;
        display: block;
      }
      
      /* Ensure content is visible */
      .min-h-screen {
        min-height: 100vh !important;
      }
      
      /* Loading fallback - will be removed when React loads */
      .loading-fallback {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #7CB518 0%, #001F54 100%);
        color: white;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 1rem;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loading once React is ready */
      .react-ready .loading-fallback {
        display: none !important;
      }
      
      /* Debugging styles - temporary */
      .debug-visible {
        border: 2px solid red !important;
        background-color: rgba(255, 0, 0, 0.1) !important;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="loading-fallback" id="initial-loading">
        <div class="loading-spinner"></div>
        <div>
          <h1>WEDESIHOMES</h1>
          <p>Loading your perfect student home...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      console.log('Index.html script executing...');
      
      // More aggressive timeout fallback for production
      setTimeout(function() {
        const loadingElement = document.getElementById('initial-loading');
        if (loadingElement) {
          console.log('Timeout: Removing loading screen');
          loadingElement.remove();
          document.body.classList.add('react-ready');
        }
      }, 5000);
      
      // Global error handling with better production error display
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        
        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = `
            <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #7CB518 0%, #001F54 100%); color: white;">
              <div style="background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 10px; max-width: 500px;">
                <h1 style="margin-bottom: 1rem; font-size: 2rem;">WEDESIHOMES</h1>
                <p style="margin-bottom: 1rem; font-size: 1.1rem;">We're experiencing technical difficulties loading the application.</p>
                <button onclick="window.location.reload()" style="padding: 12px 24px; background: white; color: #001F54; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.3s;">
                  Reload Page
                </button>
              </div>
            </div>
          `;
        }
      });
      
      // Check if script is loading properly and add debugging
      window.addEventListener('load', function() {
        console.log('Window loaded, checking for React...');
        setTimeout(function() {
          const root = document.getElementById('root');
          console.log('Root element content:', root ? root.innerHTML.length : 'No root');
          console.log('Root element children:', root ? root.children.length : 'No root');
          
          if (root && root.children.length > 0) {
            console.log('Content detected in root element');
            // Add debug styling temporarily
            const allElements = root.querySelectorAll('*');
            console.log('Total elements found:', allElements.length);
            
            // Check if content is hidden
            const visibleElements = Array.from(allElements).filter(el => {
              const style = window.getComputedStyle(el);
              return style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0';
            });
            console.log('Visible elements:', visibleElements.length);
          }
          
          if (!document.body.classList.contains('react-ready')) {
            console.warn('React may not have loaded properly');
            // Force remove loading screen if React hasn't loaded
            const loadingElement = document.getElementById('initial-loading');
            if (loadingElement) {
              loadingElement.remove();
            }
          }
        }, 1000);
      });
    </script>
  </body>
</html>
